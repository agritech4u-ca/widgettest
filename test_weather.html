<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
  }

  h1 {
    margin-bottom: 10px;
  }

  #city {
    font-size: 16px;
    opacity: 0.8;
    margin-bottom: 20px;
  }

  #weather {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    width: 140px;
  }

  .temp {
    font-size: 22px;
    font-weight: bold;
  }

  .icon {
    font-size: 30px;
    margin: 5px 0;
  }
</style>
</head>

<body>

<h1>🌤 Weather Dashboard</h1>
<div id="city"></div>
<div id="weather"></div>

<script>
const weatherDiv = document.getElementById("weather");
const cityDiv = document.getElementById("city");

// Weather icons based on Open-Meteo codes
function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "⛅";
  if (code <= 48) return "🌫";
  if (code <= 67) return "🌧";
  if (code <= 77) return "❄️";
  if (code <= 99) return "⛈";
  return "❔";
}

// Get city/region, with fallback
function getCity(lat, lon, fallbackName = "Unknown Location") {
  fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}`)
    .then(res => res.json())
    .then(data => {
      if (data.results && data.results.length > 0) {
        const place = data.results[0];
        cityDiv.textContent = `${place.name || fallbackName}, ${place.admin1 || place.country || ""}`;
      } else {
        cityDiv.textContent = fallbackName;
      }
    })
    .catch(err => {
      console.error("City fetch error:", err);
      cityDiv.textContent = fallbackName;
    });
}

// Fetch weather
function getWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&current_weather=true&timezone=auto`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const days = data.daily.time;
      const maxTemps = data.daily.temperature_2m_max;
      const minTemps = data.daily.temperature_2m_min;
      const rain = data.daily.precipitation_probability_max;
      const codes = data.daily.weathercode;
      const feelsLike = data.current_weather.temperature;

      weatherDiv.innerHTML = "";

      days.forEach((day, i) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="icon">${getWeatherIcon(codes[i])}</div>
          <div class="temp">${maxTemps[i]}°C</div>
          <div>Min: ${minTemps[i]}°C</div>
          <div>🌧 ${rain[i]}%</div>
          ${i === 0 ? `<div style="margin-top:5px;">Feels: ${feelsLike}°C</div>` : ""}
        `;
        weatherDiv.appendChild(div);
      });
    })
    .catch(err => {
      weatherDiv.innerHTML = "<p>Unable to load weather data.</p>";
    });
}

// Initialize dashboard with geolocation fallback
function init() {
  const fallbackLat = 40.1;   // Fallback coordinates
  const fallbackLon = -74.2;
  const fallbackCity = "Default Location Name New York"; // Default city name

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        getCity(lat, lon, fallbackCity);
        getWeather(lat, lon);
      },
      () => {
        // geolocation blocked
        getCity(fallbackLat, fallbackLon, fallbackCity);
        getWeather(fallbackLat, fallbackLon);
      }
    );
  } else {
    // geolocation unsupported
    getCity(fallbackLat, fallbackLon, fallbackCity);
    getWeather(fallbackLat, fallbackLon);
  }
}

init();
</script>

</body>
</html>
