<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 20px;
  }

  h1 {
    margin-bottom: 5px;
  }

  #city {
    font-size: 16px;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  #weather {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    width: 140px;
    transition: 0.2s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .temp {
    font-size: 22px;
    font-weight: bold;
  }

  .icon {
    font-size: 30px;
    margin: 5px 0;
  }
</style>
</head>

<body>

<h1>🌤 Weather Dashboard</h1>
<div id="city"></div> <!-- optional city/region -->
<div id="weather"></div>

<script>
const weatherDiv = document.getElementById("weather");
const cityDiv = document.getElementById("city");

// Simple weather icons
function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "⛅";
  if (code <= 48) return "🌫";
  if (code <= 67) return "🌧";
  if (code <= 77) return "❄️";
  if (code <= 99) return "⛈";
  return "❔";
}

// Optional: get city/region
function getCity(lat, lon) {
  fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}`)
    .then(res => res.json())
    .then(data => {
      if (data.results && data.results.length > 0) {
        const place = data.results[0];
        cityDiv.textContent = `${place.name}, ${place.country}`;
      }
    })
    .catch(err => {
      console.error(err);
      // leave cityDiv blank if error
    });
}

function getWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&current_weather=true&timezone=auto`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const days = data.daily.time;
      const maxTemps = data.daily.temperature_2m_max;
      const minTemps = data.daily.temperature_2m_min;
      const rain = data.daily.precipitation_probability_max;
      const codes = data.daily.weathercode;
      const feelsLike = data.current_weather.temperature;

      weatherDiv.innerHTML = "";

      days.forEach((day, i) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div>${new Date(day).toLocaleDateString('en-US', { weekday: 'short' })}</div>
          <div class="icon">${getWeatherIcon(codes[i])}</div>
          <div class="temp">${maxTemps[i]}°C</div>
          <div>Min: ${minTemps[i]}°C</div>
          <div>🌧 ${rain[i]}%</div>
          ${i === 0 ? `<div style="margin-top:5px;">Feels: ${feelsLike}°C</div>` : ""}
        `;

        weatherDiv.appendChild(div);
      });
    });
}

function init() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        getCity(lat, lon);   // optional city/region
        getWeather(lat, lon);
      },
      () => {
        // fallback if geolocation blocked
        const fallbackLat = 46.1;
        const fallbackLon = -60.2;
        getWeather(fallbackLat, fallbackLon);
        // cityDiv stays blank (optional)
      }
    );
  } else {
    // fallback if geolocation not supported
    getWeather(46.1, -60.2);
  }
}

init();
</script>

</body>
</html>
